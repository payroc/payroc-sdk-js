parameters:
  - name: displayName
    type: string
  - name: jobName
    type: string
  - name: cliCommand
    type: string
  - name: continueOnError
    type: boolean
    default: false
  - name: branchNameFragment
    type: string
    default: ''  # Optional
  - name: dependsOn
    type: object
    default: []
  - name: imageName
    type: string
    default: 'openapi-automation-cli'
  - name: dockerRegistry
    type: string
    default: 'docker.pkgs.payroc.com/backend'
  - name: imageTag
    type: string
    default: 'latest'  # Can also be pinned to an exact version, e.g. 0.4.0.210295
  - name: containerNamePrefix
    type: string
    default: 'openapi-automation-cli'
  - name: sdkLanguage
    type: string
    default: ''  # Optional
  - name: scriptName
    type: string
    default: ''  # Optional
  - name: semanticVersionComponent
    type: string
    default: ''  # Optional
  - name: CS_WORKSPACE
    type: string
    default: 'payroc'
  - name: CS_REPO
    type: string
    default: 'backend'
  - name: CS_SERVICE_SLUG
    type: string
    default: 'backend-ci-service'

jobs:
- job: ${{ parameters.jobName }}
  displayName: ${{ parameters.displayName }}
  continueOnError: ${{ parameters.continueOnError }}
  dependsOn: ${{ parameters.dependsOn }}
  pool:
    name: onprem-linux-elksdx
  workspace:
    clean: all

  steps:
    - checkout: none

    - task: CloudsmithCliSetupAndAuthenticate@1.2.0
      displayName: "Cloudsmith: Authenticate via OIDC"
      inputs:
        authMethod: 'oidc'
        oidcAuthOnly: false
        pipInstall: false
        cliVersion: '1.3.1'
        oidcNamespace: '${{ parameters.CS_WORKSPACE }}'
        oidcServiceSlug: '${{ parameters.CS_SERVICE_SLUG }}'

    - script: |
        echo "$(CLOUDSMITH_API_KEY)" | docker login docker.pkgs.payroc.com --username ${{ parameters.CS_SERVICE_SLUG }} --password-stdin
      displayName: Docker Login to Cloudsmith

    - script: |
        echo "Resolved Docker image: ${{ parameters.dockerRegistry }}/${{ parameters.imageName }}:${{ parameters.imageTag }}"
        echo "Command to run: ${{ parameters.cliCommand }} --environment=Prod"
        if [ ! -z "${{ parameters.branchNameFragment }}" ]; then
          echo "With branch name fragment: ${{ parameters.branchNameFragment }}"
        fi
        if [ ! -z "${{ parameters.sdkLanguage }}" ]; then
          echo "With SDK language: ${{ parameters.sdkLanguage }}"
        fi
        if [ ! -z "${{ parameters.scriptName }}" ]; then
          echo "With script name: ${{ parameters.scriptName }}"
        fi
        if [ ! -z "${{ parameters.semanticVersionComponent }}" ]; then
          echo "With semantic version: ${{ parameters.semanticVersionComponent }}"
        fi
        echo "Env: GITHUB_BOT_USERNAME = $(GITHUB_BOT_USERNAME)"
        echo "Env: GITHUB_AUTHOR_NAME = $(GITHUB_AUTHOR_NAME)"
        echo "Env: POSTHOG_API_HOST = $(POSTHOG_API_HOST)"
        echo "Other secrets masked"
      displayName: Log CLI Variables

    - script: |
        echo "Pulling Docker image..."
        docker pull ${{ parameters.dockerRegistry }}/${{ parameters.imageName }}:${{ parameters.imageTag }}
      displayName: Pull Docker Image

    - script: |
        # Use branch name for container naming (sanitize special characters)
        BRANCH_NAME=$(echo "$(Build.SourceBranchName)" | sed 's/[^a-zA-Z0-9._-]/-/g')
        CONTAINER_NAME="${{ parameters.containerNamePrefix }}-${{ parameters.jobName }}-$BRANCH_NAME"
        echo "##vso[task.setvariable variable=CONTAINER_NAME]$CONTAINER_NAME"
        docker rm -f "$CONTAINER_NAME" 2>/dev/null || true
      displayName: 'Cleanup & Generate Unique Name'
      condition: always()

    - script: |
        echo "Running CLI container..."
        
        cmd="docker run --rm --name \"$(CONTAINER_NAME)\" \
          -e \"GITHUB_BOT_USERNAME=$GITHUB_BOT_USERNAME\" \
          -e \"GITHUB_BOT_TOKEN=$GITHUB_BOT_TOKEN\" \
          -e \"GITHUB_AUTHOR_NAME=$GITHUB_AUTHOR_NAME\" \
          -e \"GITHUB_AUTHOR_EMAIL=$GITHUB_AUTHOR_EMAIL\" \
          -e \"FERN_TOKEN=$FERN_TOKEN\" \
          -e \"POSTHOG_API_HOST=$POSTHOG_API_HOST\" \
          -e \"POSTHOG_API_KEY=$POSTHOG_API_KEY\" \
          -e \"PAYROC_API_KEY_GENERIC=$PAYROC_API_KEY_GENERIC\" \
          -e \"PAYROC_API_KEY_PAYMENTS=$PAYROC_API_KEY_PAYMENTS\" \
          -e \"PAYROC_API_KEY_PAYMENTS_BANK_TRANSFER=$PAYROC_API_KEY_PAYMENTS_BANK_TRANSFER\" \
          -e \"TERMINAL_ID_AVS=$TERMINAL_ID_AVS\" \
          -e \"TERMINAL_ID_NO_AVS=$TERMINAL_ID_NO_AVS\" \
          -e \"TERMINAL_ID_AVS_PAYMENTS_BANK_TRANSFER_PAD=$TERMINAL_ID_AVS_PAYMENTS_BANK_TRANSFER_PAD\" \
          -e \"TERMINAL_ID_AVS_PAYMENTS_BANK_TRANSFER=$TERMINAL_ID_AVS_PAYMENTS_BANK_TRANSFER\" \
          -e \"NUGET_API_KEY=$NUGET_API_KEY\" \
          \"${{ parameters.dockerRegistry }}/${{ parameters.imageName }}:${{ parameters.imageTag }}\" \
          \"${{ parameters.cliCommand }}\" \
          --environment=Prod"

        if [ ! -z "${{ parameters.branchNameFragment }}" ]; then
          cmd="$cmd --branch-name-fragment \"${{ parameters.branchNameFragment }}\""
        fi

        if [ ! -z "${{ parameters.sdkLanguage }}" ]; then
          cmd="$cmd --sdk-language \"${{ parameters.sdkLanguage }}\""
        fi

        if [ ! -z "${{ parameters.scriptName }}" ]; then
          cmd="$cmd --script-name \"${{ parameters.scriptName }}\""
        fi

        if [ ! -z "${{ parameters.semanticVersionComponent }}" ]; then
          cmd="$cmd --semantic-version-component \"${{ parameters.semanticVersionComponent }}\""
        fi

        echo "$cmd"
        eval $cmd
      env:
        GITHUB_BOT_USERNAME: $(GITHUB_BOT_USERNAME)
        GITHUB_BOT_TOKEN: $(GITHUB_BOT_TOKEN)
        GITHUB_AUTHOR_NAME: $(GITHUB_AUTHOR_NAME)
        GITHUB_AUTHOR_EMAIL: $(GITHUB_AUTHOR_EMAIL)
        FERN_TOKEN: $(FERN_TOKEN)
        POSTHOG_API_HOST: $(POSTHOG_API_HOST)
        POSTHOG_API_KEY: $(POSTHOG_API_KEY)
        PAYROC_API_KEY_GENERIC: $(PAYROC_API_KEY_GENERIC)
        PAYROC_API_KEY_PAYMENTS: $(PAYROC_API_KEY_PAYMENTS)
        PAYROC_API_KEY_PAYMENTS_BANK_TRANSFER: $(PAYROC_API_KEY_PAYMENTS_BANK_TRANSFER)
        TERMINAL_ID_AVS: $(TERMINAL_ID_AVS)
        TERMINAL_ID_NO_AVS: $(TERMINAL_ID_NO_AVS)
        TERMINAL_ID_AVS_PAYMENTS_BANK_TRANSFER_PAD: $(TERMINAL_ID_AVS_PAYMENTS_BANK_TRANSFER_PAD)
        TERMINAL_ID_AVS_PAYMENTS_BANK_TRANSFER: $(TERMINAL_ID_AVS_PAYMENTS_BANK_TRANSFER)
        NUGET_API_KEY: $(NUGET_API_KEY)
      displayName: Run CLI Command
